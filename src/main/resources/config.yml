# ChestCapacity 配置（面向红石服）
#
# 架构：物理箱子的 27 格 = 红石接口（走原版漏斗机制，插件零接管）；
#       扩容出来的大容量放在插件独立数据文件里（虚拟存储）；
#       插件用调度任务维持物理 27 格处于一个“目标水位”，多则下沉、少则补货。
#
# 核心：滞回双阈值 [keep-filled-low, keep-filled-high] 覆盖吃货/供货/双向：
#   物理非空槽 < low  -> 补货：从虚拟存储抽货回物理格(下游漏斗抽空了, 补上让它继续抽)
#   物理非空槽 > high -> 下沉：把物理格多余货塞进虚拟存储(上游漏斗塞满了, 腾格让它继续塞)
#   low ~ high 之间   -> 不动(滞回带, 避免每 tick 来回震荡)
#
# 重要：物理 27 格是红石接口, 玩家在扩容 GUI 里【看不到】它, GUI 只显示虚拟存储。
#   所以 high 要尽量小, 让漏斗输入的货尽快下沉进【可见的】虚拟存储, 否则会囤在
#   物理格里, 玩家以为"东西不见了"(其实破坏箱子仍会掉出)。
#
#   low=1,  high=1   -> 双向缓冲, 开箱即用推荐:
#                       漏斗输入 -> 超过 1 格立刻下沉到虚拟存储(GUI 可见);
#                       漏斗抽出 -> 抽空后补 1 格继续供货; 物理格恒定只留 1 格, 玩家几乎无感。
#   low=0,  high=0   -> 物理格尽量清空 => 无限吃货箱(能进, 但下游漏斗抽不出)
#   low=27, high=27  -> 物理格尽量填满 => 无限供货箱(能抽, 但漏斗输入会囤在物理格不可见)
#   buffer-enabled = false -> 不搬运 => 纯玩家 GUI 大仓库
#
# 一般不要把 high 设大: high 越大, 越多货滞留在不可见的物理格里。
#
# 兼容旧配置：只写了 keep-filled-slots(单水位)时, 等价于 low=high=该值。

# —— 容量 ——
# 放置扩容箱物品时，若物品没写页数则用这个默认值。每页可用 45 格。
default-pages: 1
# 允许设置的最大页数（防止单箱数据过大）。
max-pages: 54

# —— 红石水位缓冲 ——
# 是否启用物理格↔虚拟存储的自动搬运。关掉则箱子纯做 GUI 大仓库。
buffer-enabled: true
# 滞回双阈值：物理 27 格非空槽维持在 [low, high] 区间内。0~27。
# 默认 low=1/high=1 => 物理格恒留 1 格: 漏斗输入超 1 格立刻下沉到虚拟存储(GUI 可见),
# 抽空后补 1 格继续供货。既能塞又能抽, 且不把货囤在不可见的物理格里。
keep-filled-low: 1
keep-filled-high: 1
# 搬运调度间隔（tick）。红石服建议 2~4，越小越跟手但开销越大。
transfer-interval-ticks: 2
# 每个箱子每次搬运的最大堆叠数（限流，避免单 tick 搬运过多造成卡顿）。
transfer-batch-per-chest: 5
# 补货粒度：下游漏斗抽空物理缓冲后, 一次从虚拟存储抽多少个补回物理格。1~64。
# 默认 1 => 虚拟存储(GUI)逐个减少, 贴合原版漏斗被抽取的视觉观感。
# 高速/多漏斗并联的红石服若出现断流, 可调大(如 16/64)提升吞吐, 代价是 GUI 扣减更"跳"。
refill-batch: 1

# —— 落盘 ——
# 数据异步落盘间隔（tick）。1200 = 60 秒。
save-interval-ticks: 1200

# —— 破坏行为 ——
# 破坏箱子时掉落一个保留容量 NBT 的空箱子物品（便于回收扩容箱）。
drop-capacity-item: true
# 破坏箱子时，虚拟存储里的大量物品分批限速掉落在原地（红石服防卡顿）。
break-drop-per-tick: 20

# —— 悬浮文字（放好的方块没有原版 tooltip，用 TextDisplay 顶上显示容量占用）——
# enabled 是全局总开关(false 则任何箱子都不显示); 每个箱子还各有一个默认关闭的开关,
# 玩家在箱子 GUI 底部按钮里按需开启。两者都为真才会挂出悬浮字。
hologram:
  enabled: true
  # 相对箱子方块中心的竖直偏移（格）。
  y-offset: 1.1
  # 文案。占位符: %used% 已用格  %slots% 总格  %pages% 页数  %pct% 百分比
  text: "&6大大大箱子\n&7%used%&8/&7%slots% &8(&e%pct%%&8)"

# —— GUI 文案（& 颜色码）——
gui:
  title: "&8大大大箱子 &7[%page%/%pages%]"
  prev-page: "&a« 上一页"
  next-page: "&a下一页 »"
  page-indicator: "&e第 %page% / %pages% 页"
  filler: true            # 导航行空位用玻璃板填充
  # 溢出销毁按钮文案（首行=按钮名，其余行=lore；\n 换行）。
  # 开启后：虚拟仓库满时物理格里搬不下的溢出物品被直接删除，防止漏斗回堵。
  void-overflow-on: "&c溢出销毁: 开\n&7虚拟仓库满后, 搬不下的溢出物品\n&7将被直接删除(防红石堵塞)。\n&e点击关闭"
  void-overflow-off: "&a溢出销毁: 关\n&7虚拟仓库满后, 物理格保留物品\n&7(可能回堵漏斗)。\n&e点击开启"
  # 容量悬浮字开关按钮文案（每箱独立, 默认关闭, 玩家在 GUI 里按需开启）。
  hologram-on: "&a悬浮字: 开\n&7箱子上方显示容量占用文字。\n&e点击关闭"
  hologram-off: "&7悬浮字: 关\n&7箱子上方不显示文字。\n&e点击开启"
  # 名字悬浮字开关按钮文案。名字来自铁砧重命名后的扩容箱物品，放置时继承。
  # 它从属于容量悬浮字：容量悬浮字关闭时名字也强制隐藏。
  name-hologram-on: "&a名字悬浮字: 开\n&7显示箱子的铁砧命名。\n&7关闭容量悬浮字时会一并隐藏。\n&e点击关闭"
  name-hologram-off: "&7名字悬浮字: 关\n&7用铁砧重命名扩容箱物品后放置，\n&7可在箱子上方显示名字。\n&e点击开启"

# —— 箱子“物品形态”的显示（放手上/容器里悬停可读）——
# 方块形态无 lore，这是原版限制，改用上面的 hologram 显示。
# 占位符: %pages% 页数  %slots% 总格数
item:
  name: "&6大大大箱子"
  lore:
    - "&7洋芋发动俺寻思之力设计的大箱子，"
    - "&7堪比原版 3x3 的箱子，可存海量物品。"
    - "&7容量: &f%pages% 页 &7(共 %slots% 格)"
    - "&8—————————————"
    - "&7放下即生效，右键打开大容量 GUI。"
    - "&7物理 27 格接红石，溢出自动进大仓库。"
    - "&8—————————————"
    - "&c破坏后存储内容会分批掉落在原地。"