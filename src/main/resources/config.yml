# ChestCapacity 配置（面向红石服）
#
# 架构：虚拟仓库是唯一库存真相，玩家 GUI、原版红石容器和比较器均读取同一份数据。
# 物理箱子保持为空，不再暗藏用于触发漏斗的缓冲物品。
#
# Paper 1.21.11 原版路径：普通漏斗输入/输出、漏斗矿车抽取、投掷器写入、
# 自动合成器输出，以及比较器直接/隔实心方块读取；第三方管道暂不接管。

# —— 容量 ——
# 放置扩容箱物品时，若物品没写页数则用这个默认值。每页可用 45 格。
default-pages: 1
# 允许设置的最大页数（防止单箱数据过大）。
max-pages: 54

# —— 原版红石 I/O ——
io:
  enabled: true
  # 传输周期。4 tick × 每次1件约为原版漏斗8 tick/件的两倍吞吐。
  interval-ticks: 4
  items-per-transfer: 1
  hoppers: true
  hopper-minecarts: true

# —— 落盘 ——
# 数据异步落盘间隔（tick）。1200 = 60 秒。
save-interval-ticks: 1200

# —— 破坏行为 ——
# 破坏箱子时掉落一个保留容量 NBT 的空箱子物品（便于回收扩容箱）。
drop-capacity-item: true
# 破坏箱子时，虚拟存储里的大量物品分批限速掉落在原地（红石服防卡顿）。
break-drop-per-tick: 20

# —— 悬浮文字（放好的方块没有原版 tooltip，用 TextDisplay 顶上显示容量占用）——
# enabled 是全局总开关(false 则任何悬浮字都不显示)。容量与名字各有一个默认关闭的箱级开关，
# 两个箱级开关相互独立；全局开关开启后，可在箱子 GUI 底部按需分别管理。
hologram:
  enabled: true
  # 相对箱子方块中心的竖直偏移（格）。
  y-offset: 1.1
  # 文案。占位符: %used% 已用格  %slots% 总格  %pages% 页数  %pct% 百分比
  text: "&6大大大箱子\n&7%used%&8/&7%slots% &8(&e%pct%%&8)"

# —— GUI 文案（& 颜色码）——
gui:
  title: "&8大大大箱子 &7[%page%/%pages%]"
  prev-page: "&a« 上一页"
  next-page: "&a下一页 »"
  page-indicator: "&e第 %page% / %pages% 页"
  filler: true            # 导航行空位用玻璃板填充
  # 整理按钮：合并相同物品并按类型整理整个虚拟仓库，包含全部页面和双联两半。
  sort: "&a整理仓库\n&7合并相同物品，并按类型整理全部页面。\n&e点击整理"
  # 溢出销毁按钮文案（首行=按钮名，其余行=lore；\n 换行）。
  # 开启后：虚拟仓库满时，输入漏斗继续送入的溢出物品会被删除，防止红石回堵。
  void-overflow-on: "&c溢出销毁: 开\n&7虚拟仓库满后, 输入端送入的溢出物品\n&7将被直接删除(防红石堵塞)。\n&e点击关闭"
  void-overflow-off: "&a溢出销毁: 关\n&7虚拟仓库满后, 物品保留在输入漏斗\n&7(可能造成红石回堵)。\n&e点击开启"
  # 比较器容量模式为每箱独立状态，默认关闭并只检测第一页 45 格。
  comparator-real-capacity-on: "&c比较器真实容量: 开\n&7按全部虚拟槽位计算红石信号。\n&7会反映扩容后的真实占用率。\n&e点击改为只检测第一页"
  comparator-real-capacity-off: "&a比较器真实容量: 关\n&7只按第一页 45 格计算红石信号。\n&7不会反映后续扩容页面。\n&e点击检测全部容量"
  # 容量悬浮字开关按钮文案（每箱独立, 默认关闭, 玩家在 GUI 里按需开启）。
  hologram-on: "&a悬浮字: 开\n&7箱子上方显示容量占用文字。\n&e点击关闭"
  hologram-off: "&7悬浮字: 关\n&7箱子上方不显示文字。\n&e点击开启"
  # 名字悬浮字开关按钮文案。名字来自铁砧重命名后的扩容箱物品，放置时继承。
  # 它与容量悬浮字相互独立，可按需单独开启或关闭。
  name-hologram-on: "&a名字悬浮字: 开\n&7显示箱子的铁砧命名。\n&7与容量悬浮字独立管理。\n&e点击关闭"
  name-hologram-off: "&7名字悬浮字: 关\n&7用铁砧重命名扩容箱物品后放置，\n&7可在箱子上方显示名字。\n&e点击开启"

# —— 箱子“物品形态”的显示（放手上/容器里悬停可读）——
# 方块形态无 lore，这是原版限制，改用上面的 hologram 显示。
# 占位符: %pages% 页数  %slots% 总格数
item:
  name: "&6大大大箱子"
  lore:
    - "&7洋芋发动俺寻思之力设计的大箱子，"
    - "&7堪比原版 3x3 的箱子，可存海量物品。"
    - "&7容量: &f%pages% 页 &7(共 %slots% 格)"
    - "&8—————————————"
    - "&7放下即生效，右键打开大容量 GUI。"
    - "&7原版漏斗、漏斗矿车、投掷器与合成器可直接交互。"
    - "&7比较器支持直接读取及隔实心方块读取。"
    - "&7物理箱保持为空，不会隐藏额外物品。"
    - "&8—————————————"
    - "&c破坏后存储内容会分批掉落在原地。"