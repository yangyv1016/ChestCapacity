name: Build & Release

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]
  workflow_dispatch:          # 允许手动触发

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write      # 创建 Release 需要

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build with Gradle
        env:
          # tag 触发时把 tag 名（如 v1.0.4）传给构建，使 jar 名随版本更新；
          # 非 tag 触发时该变量为空，构建回退到 build.gradle.kts 里的默认版本。
          PLUGIN_VERSION: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || '' }}
        run: ./gradlew build --no-daemon

      - name: Verify jar
        run: ls -lh build/libs/

      # tag push 时自动创建 GitHub Release
      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: build/libs/ChestCapacity-*.jar
          fail_on_unmatched_files: true

      # 常规 push 上传 jar 作为 Artifact
      - name: Upload Artifact
        if: "!startsWith(github.ref, 'refs/tags/v')"
        uses: actions/upload-artifact@v4
        with:
          name: ChestCapacity-${{ github.ref_name }}
          path: build/libs/ChestCapacity-*.jar
          if-no-files-found: error